networks:
  private_file_manager_network:
    driver: bridge
  shared_network:
    external: true

services:
  private-file-manager:
    image: yongyuanfan/workerman-php:8.4.4
    container_name: private-file-manager
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - .:/app
    networks:
      - private_file_manager_network
      - shared_network
    command: ["./private-file-manager"]
